appId: com.example.brewery_forest
name: 050_pagination
tags:
  - deterministic
# Flow 5: scroll the sheet's list to the very end. Reaching the end of a page
# (10 items) triggers loadNextPage; the "That's all for now" footer only appears
# once every page has loaded, so asserting it proves pagination ran to completion.
# (Maestro's auto-scroll targets screen center = the full-screen map, so the
# sheet's inner list must be scrolled with explicit coordinate swipes.)
---
- launchApp:
    clearState: true
    permissions:
      location: allow
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
- repeat:
    while:
      notVisible: "That's all for now"
    commands:
      - swipe:
          start: "50%, 80%"
          end: "50%, 25%"
          duration: 400
- assertVisible: "That's all for now"
