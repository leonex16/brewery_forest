appId: app.laes.brewery_forest
name: 030_search_min_chars
tags:
  - deterministic
# Flow 3: type <5 chars -> search does not fire (idle): no results, no empty msg.
---
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: allow
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: always
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible: "Search near you"
    timeout: 30000
- tapOn:
    id: "feed_search_field"
- inputText: "beer"
- extendedWaitUntil:
    visible: "beer"
    timeout: 8000
- assertNotVisible:
    id: "search_result_item"
- assertNotVisible: "No breweries found"
