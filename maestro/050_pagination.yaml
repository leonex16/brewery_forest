appId: app.laes.brewery_forest
name: 050_pagination
tags:
  - deterministic
# Flow 5: scrolling to the bottom of the loaded list fires loadNextPage. The feed
# uses `by_dist`, which paginates the ENTIRE database ordered by distance, so the
# list has no reachable "end" — instead we prove pagination *fired* by catching the
# loading indicator shown while the next page is fetched (the API enforces a ~2s
# minimum delay, so the spinner is reliably on-screen).
# (Maestro's auto-scroll targets screen center = the full-screen map, so the
# sheet's inner list is scrolled with explicit coordinate swipes.)
---
- launchApp:
    clearState: true
    permissions:
      location: allow
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
# First swipe expands the sheet; the next two scroll the 10-item first page to its
# bottom, which fires loadNextPage.
- repeat:
    times: 3
    commands:
      - swipe:
          start: "50%, 80%"
          end: "50%, 30%"
          duration: 300
- extendedWaitUntil:
    visible:
      id: "pagination_loading"
    timeout: 8000
