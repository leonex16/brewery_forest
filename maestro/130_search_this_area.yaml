appId: app.laes.brewery_forest
name: 130_search_this_area
tags:
  - deterministic
# Flow 13: pan the map >3 km from the initial query center -> the "Search in this
# area" pill appears -> tap it -> the feed re-queries around the new center and the
# pill clears. Proves the search-this-area feature end to end.
# (The map canvas isn't targetable, but panning via coordinate swipes on the map
# area is, and the pill is a normal widget with visible text.)
---
- launchApp:
    clearState: true
    permissions:
      location: allow
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
# The map fills the screen; the sheet only covers the bottom ~20%, so y=28% lands
# on the map. Pan east until the centre is >3 km from the initial query centre.
# Mapbox only commits a pan once the gesture settles — rapid back-to-back swipes
# barely move the camera — so use slow swipes with a short pause between each so the
# pans accumulate and onMapIdle fires with the new centre.
- repeat:
    times: 6
    commands:
      - swipe:
          start: "85%, 28%"
          end: "18%, 28%"
          duration: 600
      - extendedWaitUntil:
          visible: "__settle__"
          timeout: 300
          optional: true
          label: "let the map settle"
- extendedWaitUntil:
    visible: "Search in this area"
    timeout: 15000
- tapOn: "Search in this area"
# Re-searching resets lastQueryCenter -> the pill clears and the list stays populated.
- extendedWaitUntil:
    notVisible: "Search in this area"
    timeout: 15000
- assertVisible:
    id: "brewery_item"
