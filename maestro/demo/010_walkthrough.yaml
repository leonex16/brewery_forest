appId: app.laes.brewery_forest
name: 010_walkthrough
tags:
  - demo
# Narrated walkthrough of the main journey (feed -> search -> card -> detail ->
# pagination). Meant for `maestro record --local` or for running with slow
# animations (make demo). Not part of the CI suite.
---
- launchApp:
    clearState: true
    permissions:
      location: allow
    label: "Open Brewery Forest (location granted)"
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
    label: "Set our location to Toronto"
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
    label: "The feed loads nearby breweries"
- runFlow: ../subflows/pause.yaml
- tapOn:
    id: "feed_search_field"
    label: "Open the search"
- inputText:
    text: "brewing"
    label: "Type 'brewing'"
- extendedWaitUntil:
    visible:
      id: "search_result_item"
    timeout: 20000
    label: "Search results appear"
- runFlow: ../subflows/pause.yaml
- back
- runFlow: ../subflows/pause.yaml
- tapOn:
    id: "brewery_item"
    index: 0
    label: "Tap the first brewery in the list"
- extendedWaitUntil:
    visible:
      id: "brewery_card"
    timeout: 10000
    label: "The floating card opens with its data"
- runFlow: ../subflows/pause.yaml
- tapOn:
    text: "View details"
    label: "Tap 'View details' on the card"
# Assert on the address card (rendered from local data) rather than the hero map,
# whose static image is a separate network request that can be slow/fail to load.
- extendedWaitUntil:
    visible:
      text: "(?s)Address.*"
    timeout: 20000
    label: "The full brewery detail is shown"
- runFlow: ../subflows/pause.yaml
- back
- runFlow: ../subflows/pause.yaml
# Grab the handle (start ~82%, inside the strip) to expand the sheet — starting at
# its top edge lets the full-screen map behind it eat the gesture.
- swipe:
    start: "50%, 82%"
    end: "50%, 12%"
    duration: 600
    label: "Expand the list sheet"
- runFlow: ../subflows/pause.yaml
# Scroll to the bottom until a second-page brewery appears (proves pagination).
- scrollUntilVisible:
    element:
      text: "(?s)Mill Street Brew Pub.*"
    direction: DOWN
    timeout: 20000
    speed: 30
    label: "More breweries load at the end (pagination)"
- runFlow: ../subflows/pause.yaml
