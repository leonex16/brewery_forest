appId: app.laes.brewery_forest
name: 040_search_empty
tags:
  - deterministic
# Flow 4: type 'zzzzzq' (>=5 chars, no match) -> 'No breweries found'.
---
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: allow
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: always
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible: "Search near you"
    timeout: 30000
- tapOn:
    id: "feed_search_field"
- inputText: "zzzzzq"
- extendedWaitUntil:
    visible: "No breweries found"
    timeout: 20000
