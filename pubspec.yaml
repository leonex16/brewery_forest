name: brewery_forest
description: "Discover craft breweries near you, powered by the Open Brewery DB."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: 3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  cupertino_icons: 1.0.8
  dio: 5.10.0
  injectable: 3.0.0
  flutter_bloc: 9.1.1
  bloc_concurrency: 0.3.0
  get_it: 9.2.1
  go_router: 17.3.0
  json_annotation: 4.12.0
  geolocator: 14.0.3
  freezed_annotation: 3.1.0
  pretty_dio_logger: 1.4.0
  stream_transform: 2.1.1
  mapbox_maps_flutter: 3.0.0-alpha.1
  phosphoricons_flutter: 1.0.0
  url_launcher: 6.3.2
  cached_network_image: 3.4.1
  sentry_flutter: 9.23.0
  device_info_plus: 13.2.0
  shared_preferences: 2.5.5
  uuid: 4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 6.0.0
  build_runner: 2.15.0
  injectable_generator: 3.1.0
  json_serializable: 6.14.0
  freezed: 4.0.0-dev.3
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.8
  mocktail: any

flutter_launcher_icons:
  android: true
  min_sdk_android: 21
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/ic_launcher.png"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  adaptive_icon_background: "assets/icon/background.png"
  adaptive_icon_monochrome: "assets/icon/monochrome.png"

flutter_native_splash:
  color: "#FF5722"
  color_dark: "#250d00"
  image: "assets/icon/foreground.png"
  android_12:
    color: "#FF5722"
    color_dark: "#250d00"
    image: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/Outfit/License/OFL.txt

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit/Fonts/OTF/Outfit-Regular.otf
          weight: 400
        - asset: assets/fonts/Outfit/Fonts/OTF/Outfit-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Outfit/Fonts/OTF/Outfit-Bold.otf
          weight: 700
