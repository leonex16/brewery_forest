appId: app.laes.brewery_forest
name: 010_feed_loads
tags:
  - deterministic
  - smoke
# Flow 1: launch with location granted -> feed reached and the brewery list
# has items (Open Brewery DB page 1 always returns breweries).
---
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: allow
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: always
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible: "Search near you"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
