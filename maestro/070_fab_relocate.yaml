appId: app.laes.brewery_forest
name: 070_fab_relocate
tags:
  - deterministic
# Flow 7: tap the location FAB -> feed reloads by location and stays operative
# (brewery list is present again after the refresh).
---
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: allow
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          clearState: true
          permissions:
            location: always
- setLocation:
    latitude: 43.6532
    longitude: -79.3832
- extendedWaitUntil:
    visible: "Search near you"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
- tapOn: "Search near you"
- extendedWaitUntil:
    visible:
      id: "brewery_item"
    timeout: 30000
